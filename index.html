<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finanzas UFPS - Login</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>💳</text></svg>">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="auth-page">
    <div class="auth-container glass-panel">
        <div class="auth-header">
            <div class="logo">
                <i class="fa-solid fa-wallet"></i>
                <span>Finanzas<strong>UFPS</strong></span>
            </div>
            <p id="auth-subtitle">Accede a tu workspace financiero</p>
        </div>

        <!-- Alertas -->
        <div id="auth-alert" class="alert hidden"></div>

        <!-- Login Form -->
        <form id="login-form" class="auth-form">
            <div class="form-group">
                <label for="login-email">Correo Electrónico</label>
                <div class="input-icon">
                    <i class="fa-regular fa-envelope"></i>
                    <input type="email" id="login-email" placeholder="estudiante@ufps.edu.co" required>
                </div>
            </div>
            <div class="form-group">
                <label for="login-password">Contraseña</label>
                <div class="input-icon">
                    <i class="fa-solid fa-lock"></i>
                    <input type="password" id="login-password" placeholder="••••••••" required>
                </div>
            </div>
            <button type="submit" class="btn btn-primary btn-block" id="btn-login">
                <span>Ingresar</span>
                <i class="fa-solid fa-arrow-right"></i>
            </button>
            <p class="auth-switch">¿No tienes cuenta? <a href="#" id="go-to-register">Regístrate aquí</a></p>
        </form>

        <!-- Register Form -->
        <form id="register-form" class="auth-form hidden">
            <div class="form-group">
                <label for="reg-nombre">Nombre Completo</label>
                <div class="input-icon">
                    <i class="fa-regular fa-user"></i>
                    <input type="text" id="reg-nombre" placeholder="Juan Pérez" required>
                </div>
            </div>
            <div class="form-group">
                <label for="reg-email">Correo Electrónico</label>
                <div class="input-icon">
                    <i class="fa-regular fa-envelope"></i>
                    <input type="email" id="reg-email" placeholder="estudiante@ufps.edu.co" required>
                </div>
            </div>
            <div class="form-group">
                <label for="reg-password">Contraseña</label>
                <div class="input-icon">
                    <i class="fa-solid fa-lock"></i>
                    <input type="password" id="reg-password" placeholder="••••••••" required minlength="6">
                </div>
            </div>
            <button type="submit" class="btn btn-primary btn-block" id="btn-register">
                <span>Crear Cuenta</span>
                <i class="fa-solid fa-user-plus"></i>
            </button>
            <p class="auth-switch">¿Ya tienes cuenta? <a href="#" id="go-to-login">Inicia sesión</a></p>
        </form>
    </div>

    <!-- Background decoration -->
    <div class="bg-shape shape-1"></div>
    <div class="bg-shape shape-2"></div>
    <div class="bg-shape shape-3"></div>

    <script type="module" src="js/auth.js"></script>
</body>
</html>
